<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile | Nguyễn Đặng Đăng Duy</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <!-- Tabler Icons -->
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"
    />
    <style>
      :root {
        --primary-gradient: linear-gradient(
          to right,
          #3b82f6,
          #8b5cf6,
          #ec4899
        );
        --bg-gradient: linear-gradient(to bottom right, #f9fafb, #f3f4f6);
        --card-bg: #ffffff;
        --text-main: #111827;
        --text-muted: #6b7280;
        --border-color: #e5e7eb;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg-gradient: linear-gradient(to bottom right, #18181b, #27272a);
          --card-bg: #27272a;
          --text-main: #ffffff;
          --text-muted: #a1a1aa;
          --border-color: #3f3f46;
        }
      }

      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg-gradient);
        color: var(--text-main);
        min-height: 100vh;
        padding: 3rem 1rem;
      }

      .container {
        max-width: 896px;
        margin: 0 auto;
      }

      .card {
        background: var(--card-bg);
        border-radius: 1rem;
        box-shadow:
          0 20px 25px -5px rgba(0, 0, 0, 0.1),
          0 10px 10px -5px rgba(0, 0, 0, 0.04);
        overflow: hidden;
      }

      .header-banner {
        height: 8rem;
        background: var(--primary-gradient);
        position: relative;
      }

      .avatar-container {
        position: absolute;
        bottom: -4rem;
        left: 2rem;
      }

      .avatar {
        width: 8rem;
        height: 8rem;
        border-radius: 9999px;
        border: 4px solid var(--card-bg);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        object-fit: cover;
        background: #fff;
      }

      .profile-content {
        padding: 5rem 2rem 2rem;
      }

      .profile-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 2.5rem;
      }

      .user-meta h1 {
        font-size: 1.875rem;
        font-weight: 700;
        margin-bottom: 0.5rem;
      }

      .username {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-muted);
        font-size: 1rem;
      }

      .edit-btn {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1.5rem;
        background: var(--primary-gradient);
        color: white;
        font-weight: 500;
        border-radius: 0.5rem;
        border: none;
        cursor: pointer;
        transition: all 0.2s;
      }

      .edit-btn:hover {
        transform: scale(1.05);
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      .info-grid {
        display: grid;
        grid-template-columns: 1fr;
        gap: 1.5rem;
      }

      @media (min-width: 768px) {
        .info-grid {
          grid-template-columns: 1fr 1fr;
        }
        .info-item.full-width {
          grid-column: span 2;
        }
      }

      .info-item label {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.5rem;
      }

      .info-item p {
        font-weight: 500;
        padding-left: 1.5rem;
      }

      .ti {
        font-size: 1.1rem;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="card">
        <!-- Header Banner -->
        <div class="header-banner">
          <div class="avatar-container">
            <img
              th:src="@{/images/avatar.jpg}"
              src="../static/images/avatar.jpg"
              alt="Avatar"
              class="avatar"
            />
          </div>
        </div>

        <!-- Profile Info -->
        <div class="profile-content">
          <div class="profile-header">
            <div class="user-meta">
              <h1>Nguyễn Đặng Đăng Duy - 2180604809</h1>
              <div class="username">
                <i class="ti ti-user"></i>
                <span>@nguyexndii</span>
              </div>
            </div>
            <button class="edit-btn">
              <i class="ti ti-edit"></i>
              <span>Chỉnh sửa</span>
            </button>
          </div>

          <!-- Information Grid -->
          <div class="info-grid">
            <!-- Email -->
            <div class="info-item">
              <label><i class="ti ti-mail"></i> Email</label>
              <p>nguyexndii.2003@gmail.com</p>
            </div>

            <!-- Phone -->
            <div class="info-item">
              <label><i class="ti ti-phone"></i> Số điện thoại</label>
              <p>0348.345.248</p>
            </div>

            <!-- Address -->
            <!-- <div class="info-item full-width">
                        <label><i class="ti ti-map-pin"></i> Địa chỉ</label>
                        <p>HUTECH University, TP. Hồ Chí Minh</p>
                    </div> -->

            <!-- Birthday -->
            <div class="info-item">
              <label><i class="ti ti-cake"></i> Ngày sinh</label>
              <p>25 tháng 11, 2003</p>
            </div>

            <!-- Join Date -->
            <div class="info-item">
              <label><i class="ti ti-calendar"></i> Ngày tham gia</label>
              <p>27 tháng 03, 2026</p>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
